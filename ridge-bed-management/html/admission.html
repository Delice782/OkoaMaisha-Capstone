<!DOCTYPE html>
<html>
<head>
    <title>Patient Admission</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
    <img src="../images/ridge-logo.png">
</header>
    
<img src="images/admission.jpg" class="section-image">

<form>
    <h2 class="section-title">Patient Admission Form</h2>

    <label>Patient Name</label>
    <input type="text">

    <label>Age</label>
    <input type="number">

    <label>Gender</label>
    <select>
        <option>Male</option>
        <option>Female</option>
    </select>

    <label>Ward</label>
    <input type="text">

    <label>Admission Date</label>
    <input type="date">

    <button>Submit</button>
</form>

<footer>
    <p>Ridge Hospital</p>
</footer>

</body>
</html>
