<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logout | Ridge Hospital</title>

<script>
    // Clear login state and redirect to home
    window.addEventListener('DOMContentLoaded', () => {
        // Remove login status
        localStorage.removeItem("isLoggedIn");
        localStorage.removeItem("currentUser"); // optional if you store the logged-in email

        // Optionally, you can show a message for a second before redirect
        document.body.innerHTML = `
            <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; font-family:Segoe UI, sans-serif;">
                <h2>You have been logged out successfully.</h2>
                <p>Redirecting to <a href="index.html">Home Page</a>...</p>
            </div>
        `;

        // Redirect after 2 seconds
        setTimeout(() => {
            window.location.href = "index.html";
        }, 2000);
    });
</script>
</head>
<body>
</body>
</html>
